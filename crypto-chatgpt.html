<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Crypto Portfolio Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:white; padding:20px; }
    h1 { margin-bottom: 10px; }
    table { width:100%; border-collapse: collapse; margin-top:20px; }
    th, td { padding:8px; border-bottom:1px solid #334155; text-align:right; font-size:14px; }
    th { cursor:pointer; background:#1e293b; position:sticky; top:0; }
    th:first-child, td:first-child { text-align:left; }
    tr:hover { background:#1e293b; }
    .totals { margin-top:20px; font-size:18px; }
    button { padding:8px 12px; margin-top:10px; background:#22c55e; border:none; color:white; cursor:pointer; }
  </style>
</head>
<body>

<h1>Crypto Portfolio Dashboard</h1>
<button onclick="loadPrices()">Refresh Prices</button>

<table id="portfolioTable">
  <thead>
    <tr>
      <th onclick="sortTable('name')">Coin</th>
      <th onclick="sortTable('coins')">Coins Held</th>
      <th onclick="sortTable('buyPrice')">Buy Price</th>
      <th onclick="sortTable('invested')">Amount Invested</th>
      <th onclick="sortTable('currentPrice')">Current Price</th>
      <th onclick="sortTable('currentValue')">Current Value</th>
      <th onclick="sortTable('profitPercent')">P/L %</th>
      <th onclick="sortTable('allocation')">Allocation %</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="totals">
  <div><strong>Total Invested:</strong> $<span id="totalInvested">0</span></div>
  <div><strong>Total Current Value:</strong> $<span id="totalCurrent">0</span></div>
</div>

<script>

let portfolio = [
  { name: "HEC", coinGeckoId: "hec", coins: 384.0493, buyPrice: 104.47202924669783 },
  { name: "VET", coinGeckoId: "vechain", coins: 234148.04412076843, buyPrice: 0.08177717777777778 },
  { name: "ETH", coinGeckoId: "ethereum", coins: 12.00381445, buyPrice: 1724.4032 },
  { name: "UST", coinGeckoId: "terrausd", coins: 11353.6463, buyPrice: 1.0 },
  { name: "CAKE", coinGeckoId: "pancakeswap-token", coins: 822.694, buyPrice: 13.9188 },
  { name: "ADA", coinGeckoId: "cardano", coins: 6503.80186061, buyPrice: 1.3703333333333336 },
  { name: "LTC", coinGeckoId: "litecoin", coins: 37.34770697, buyPrice: 151.36 },
  { name: "AAVE", coinGeckoId: "aave", coins: 24.8619833118, buyPrice: 245.7486923076923 },
  { name: "POL2", coinGeckoId: "polygon", coins: 5327.6, buyPrice: 1.0732033333333335 },
  { name: "POL1", coinGeckoId: "polygon", coins: 5327.6, buyPrice: 1.0732033333333335 },
  { name: "ICP", coinGeckoId: "internet-computer", coins: 43.640064941, buyPrice: 115.29666666666667 },
  { name: "USDC", coinGeckoId: "usd-coin", coins: 9477.336, buyPrice: 1.0 },
  { name: "DOGE", coinGeckoId: "dogecoin", coins: 16783.34447962, buyPrice: 0.3182635 },
  { name: "DOT", coinGeckoId: "polkadot", coins: 95.2682758174, buyPrice: 31.0664 },
  { name: "LINK", coinGeckoId: "chainlink", coins: 162.1556827532, buyPrice: 16.74 },
  { name: "XLM", coinGeckoId: "stellar", coins: 7500, buyPrice: 0.335 },
  { name: "MINA", coinGeckoId: "mina-protocol", coins: 868.267, buyPrice: 2.8212483549 },
  { name: "AVAX", coinGeckoId: "avalanche-2", coins: 56.3, buyPrice: 62.1050455706 },
  { name: "PYTH", coinGeckoId: "pyth-network", coins: 10000, buyPrice: 0.10376 },
  { name: "JUP", coinGeckoId: "jupiter-exchange-solana", coins: 2000, buyPrice: 0.51 },
  { name: "ONE", coinGeckoId: "harmony", coins: 7204.195723589419, buyPrice: 0.069404 },
  { name: "BCH", coinGeckoId: "bitcoin-cash", coins: 0.2556, buyPrice: 902.496 },
  { name: "ETC", coinGeckoId: "ethereum-classic", coins: 40.36, buyPrice: 3.944 },
  { name: "CELO", coinGeckoId: "celo", coins: 41.4, buyPrice: 3.595 },
  { name: "IOTA", coinGeckoId: "iota", coins: 99.9, buyPrice: 1.248 },
  { name: "FTM", coinGeckoId: "fantom", coins: 999.497528, buyPrice: 1.6626552071 },
  { name: "BNB", coinGeckoId: "binancecoin", coins: 0.324552, buyPrice: 308.715 },
  { name: "HBAR", coinGeckoId: "hedera-hashgraph", coins: 100000.80388924, buyPrice: 0.2257663736 },
  { name: "XRP", coinGeckoId: "ripple", coins: 13.051, buyPrice: 1.552 },
  { name: "QNT", coinGeckoId: "quant-network", coins: 0.3526056319, buyPrice: 28.978 },
  { name: "BTC", coinGeckoId: "bitcoin", coins: 1.2794239, buyPrice: 28433.7579102811 },
  { name: "SOL", coinGeckoId: "solana", coins: 0.5195336836, buyPrice: 137.0666666667 }
];

let sortDirection = 1;
let currentSort = null;

async function loadPrices() {
  const ids = portfolio.map(c => c.coinGeckoId).join(',');
  const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`;
  const response = await axios.get(url);
  const prices = response.data;

  let totalCurrent = 0;

  portfolio.forEach(coin => {
    coin.currentPrice = prices[coin.coinGeckoId]?.usd || 0;
    coin.invested = coin.buyPrice * coin.coins;
    coin.currentValue = coin.currentPrice * coin.coins;
    coin.profitPercent = coin.invested > 0 ? ((coin.currentValue - coin.invested) / coin.invested) * 100 : 0;
    totalCurrent += coin.currentValue;
  });

  portfolio.forEach(coin => {
    coin.allocation = totalCurrent > 0 ? (coin.currentValue / totalCurrent) * 100 : 0;
  });

  renderTable();
}

function renderTable() {
  const tbody = document.querySelector('#portfolioTable tbody');
  tbody.innerHTML = '';

  let totalInvested = 0;
  let totalCurrent = 0;

  portfolio.forEach(coin => {
    totalInvested += coin.invested;
    totalCurrent += coin.currentValue;

    const row = `<tr>
      <td>${coin.name}</td>
      <td>${coin.coins.toLocaleString()}</td>
      <td>${coin.buyPrice.toFixed(4)}</td>
      <td>${coin.invested.toFixed(2)}</td>
      <td>${coin.currentPrice.toFixed(4)}</td>
      <td>${coin.currentValue.toFixed(2)}</td>
      <td>${coin.profitPercent.toFixed(2)}%</td>
      <td>${coin.allocation.toFixed(2)}%</td>
    </tr>`;

    tbody.innerHTML += row;
  });

  document.getElementById('totalInvested').innerText = totalInvested.toFixed(2);
  document.getElementById('totalCurrent').innerText = totalCurrent.toFixed(2);
}

function sortTable(key) {
  if (currentSort === key) sortDirection *= -1;
  else sortDirection = 1;
  currentSort = key;

  portfolio.sort((a, b) => {
    if (key === 'name') return a.name.localeCompare(b.name) * sortDirection;
    return (a[key] - b[key]) * sortDirection;
  });

  renderTable();
}

loadPrices();

</script>

</body>
</html>
